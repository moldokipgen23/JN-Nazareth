[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo_sqlite", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.curl", "php84Extensions.fileinfo", "php84Extensions.bcmath", "php84Extensions.gd", "nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = [
  "COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --optimize-autoloader --no-scripts --no-interaction",
  "npm ci",
  "npm run build"
]

[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --class=DatabaseSeeder --force && php artisan storage:link --force && php artisan serve --host=0.0.0.0 --port=$PORT"
